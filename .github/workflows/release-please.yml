name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      # Ces outputs permettent au workflow de déploiement
      # de savoir si une release a été créée
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # Type de projet : "python" pour analyser les fichiers Python
          release-type: python
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          # Le fichier où release-please lit/écrit la version
          version-file: app/version.py
          extra-files: |
            app/version.py
